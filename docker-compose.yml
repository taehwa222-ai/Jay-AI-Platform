services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-Jay AI Platform}
      APP_ENV: ${APP_ENV:-production}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      DATA_DIR: ${DATA_DIR:-/app/data}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-secret-key}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-720}
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
